<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos - Tim Moore</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/photos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">The Moores</a>
            </div>
            <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="photos.html" class="active">Photos</a></li>
                <li><a href="login.html" class="login-btn">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="photos-hero">
            <div class="container">
                <h1>My Photos</h1>
                <p class="subtitle">Capturing moments that matter</p>
            </div>
        </section>

        <section class="gallery">
            <div class="container">
                <div id="gallery-loading" class="gallery-loading">Loading photos...</div>
                <div id="gallery-error" class="gallery-error" style="display:none;"></div>
                <div class="gallery-grid" id="gallery-grid"></div>
            </div>
        </section>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <span class="lightbox-close">&times;</span>
            <img class="lightbox-image" id="lightbox-image" src="" alt="">
            <div class="lightbox-caption">
                <h3 id="lightbox-title"></h3>
                <p id="lightbox-description"></p>
            </div>
            <button class="lightbox-prev">&#10094;</button>
            <button class="lightbox-next">&#10095;</button>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <a href="index.html">The Moores</a>
                </div>
            </div>
            <div class="copyright">
                <p>&copy; 2025 The Moores. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/photos.js"></script>
</body>
</html>
